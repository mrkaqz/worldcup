version: '3.8'

services:
  app:
    image: ghcr.io/mrkaqz/worldcup:latest
    container_name: worldcup-predictor
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/db.json
    volumes:
      - worldcup-data:/app/data
    restart: unless-stopped

volumes:
  worldcup-data:
    driver: local
